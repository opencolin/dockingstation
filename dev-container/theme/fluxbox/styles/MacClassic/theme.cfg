! Fluxbox Style: Classic Macintosh (System 7 / Mac OS 8)
! Gray platinum appearance with Chicago-style fonts

! ---- Toolbar ----
toolbar:                          flat
toolbar.color:                    #CCCCCC
toolbar.borderWidth:              1
toolbar.borderColor:              #000000
toolbar.height:                   22

toolbar.label:                    flat
toolbar.label.color:              #CCCCCC
toolbar.label.textColor:          #000000

toolbar.clock:                    flat
toolbar.clock.color:              #CCCCCC
toolbar.clock.textColor:          #000000

toolbar.workspace:                flat
toolbar.workspace.color:          #CCCCCC
toolbar.workspace.textColor:      #000000

toolbar.iconbar.focused:          flat
toolbar.iconbar.focused.color:    #CCCCCC
toolbar.iconbar.focused.textColor:#000000

toolbar.iconbar.unfocused:        flat
toolbar.iconbar.unfocused.color:  #CCCCCC
toolbar.iconbar.unfocused.textColor:#666666

toolbar.button:                   flat
toolbar.button.color:             #CCCCCC
toolbar.button.picColor:          #000000

toolbar.button.pressed:           flat
toolbar.button.pressed.color:     #999999
toolbar.button.pressed.picColor:  #000000

! ---- Menu ----
menu.frame:                       flat
menu.frame.color:                 #CCCCCC
menu.frame.textColor:             #000000
menu.frame.disableColor:          #999999

menu.title:                       flat
menu.title.color:                 #000080
menu.title.textColor:             #FFFFFF

menu.hilite:                      flat
menu.hilite.color:                #000080
menu.hilite.textColor:            #FFFFFF

menu.bullet:                      triangle
menu.bullet.position:             Right

menu.borderWidth:                 1
menu.borderColor:                 #000000

! ---- Window ----
window.title.focus:               flat
window.title.focus.color:         #CCCCCC
window.title.focus.textColor:     #000000

window.title.unfocus:             flat
window.title.unfocus.color:       #BBBBBB
window.title.unfocus.textColor:   #666666

window.label.focus:               flat
window.label.focus.color:         #CCCCCC
window.label.focus.textColor:     #000000

window.label.unfocus:             flat
window.label.unfocus.color:       #BBBBBB
window.label.unfocus.textColor:   #666666

window.handle.focus:              flat
window.handle.focus.color:        #CCCCCC

window.handle.unfocus:            flat
window.handle.unfocus.color:      #BBBBBB

window.grip.focus:                flat
window.grip.focus.color:          #CCCCCC

window.grip.unfocus:              flat
window.grip.unfocus.color:        #BBBBBB

window.button.focus:              flat
window.button.focus.color:        #CCCCCC
window.button.focus.picColor:     #000000

window.button.unfocus:            flat
window.button.unfocus.color:      #BBBBBB
window.button.unfocus.picColor:   #666666

window.button.pressed:            flat
window.button.pressed.color:      #999999
window.button.pressed.picColor:   #000000

window.frame.focusColor:          #CCCCCC
window.frame.unfocusColor:        #BBBBBB

window.borderWidth:               1
window.borderColor:               #000000

window.title.height:              20

! ---- Slit ----
slit:                             flat
slit.color:                       #CCCCCC
slit.borderWidth:                 1
slit.borderColor:                 #000000

! ---- Misc ----
borderColor:                      #000000
bevelWidth:                       1
handleWidth:                      4
frameWidth:                       1
